<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Cormorant+Garamond:wght@300;400;500&family=DM+Sans:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <title>OorjaKull</title>
    <!-- OorjaKull default: dark mode — blocking script prevents flash of light theme -->
    <script>
      (function(){
        var t = localStorage.getItem('yoga-theme');
        if (!t || t === 'dark') document.documentElement.classList.add('dark');
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
